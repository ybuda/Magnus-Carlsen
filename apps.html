<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>YTech – אפליקציות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/x-icon" href="favsion.ico?v=2"/>
<link rel="shortcut icon" type="image/x-icon" href="favsion.ico?v=2"/>
<style>
:root{
  --blue:#007bff;--cyan:#00d4ff;--bg:#07111f;--bg2:#0d1e2e;--bg3:#0a1828;
  --text:#e2e8f0;--muted:#94a3b8;--border:rgba(0,212,255,.15);
  --grad:linear-gradient(135deg,var(--blue),var(--cyan));
  --glow:0 0 40px rgba(0,212,255,.18);
  --card-hover:0 20px 60px rgba(0,212,255,.22);
  --green:#22c55e;--red:#ef4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden;cursor:url('cursor.png'),auto}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* NAV */
nav{position:fixed;top:0;right:0;left:0;z-index:900;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,17,31,.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.nav-logo{font-size:1.2rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.nav-links{display:flex;gap:1.8rem;list-style:none;align-items:center}
.nav-links a{color:var(--muted);text-decoration:none;font-size:1rem;font-weight:500;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;right:0;width:0;height:2px;background:var(--grad);transition:width .3s}
.nav-links a:hover,.nav-links a.active{color:var(--cyan)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.hamburger span{display:block;width:24px;height:2px;background:var(--cyan);border-radius:2px;transition:.3s}

/* PAGE */
.page{position:relative;z-index:1;padding-top:100px;max-width:1100px;margin:0 auto;padding-bottom:60px;padding-right:2rem;padding-left:2rem}

/* HEADER */
.page-header{text-align:center;margin-bottom:3rem}
.section-label{display:inline-block;font-size:.83rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:.75rem}
.page-title{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;line-height:1.1;margin-bottom:.8rem}
.page-title span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-desc{color:var(--muted);font-size:1.04rem;line-height:1.7}

/* FILTER */
.filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-bottom:2.5rem}
.filter-btn{padding:.42rem 1.1rem;border-radius:100px;background:rgba(0,212,255,.06);border:1px solid var(--border);color:var(--muted);font-family:'Heebo',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:background .2s,color .2s,border-color .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(0,212,255,.15);color:var(--cyan);border-color:rgba(0,212,255,.4)}

/* APPS GRID */
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.3rem}
.app-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:1.6rem;display:flex;flex-direction:column;gap:.7rem;transition:transform .3s,box-shadow .3s,border-color .3s;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.app-card::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:var(--grad);opacity:0;transition:opacity .3s}
.app-card:hover{transform:translateY(-7px);box-shadow:var(--card-hover);border-color:rgba(0,212,255,.3)}
.app-card:hover::before{opacity:1}
.app-emoji{font-size:2.3rem;line-height:1}
.app-name{font-size:1.1rem;font-weight:700}
.app-cat{font-size:.8rem;color:var(--cyan);font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
.app-desc{font-size:.95rem;color:var(--muted);line-height:1.6;flex:1}
.app-price-tag{font-size:.88rem;font-weight:700;color:#fff;background:var(--grad);padding:.25rem .7rem;border-radius:100px;align-self:flex-start}
.app-free{font-size:.9rem;font-weight:700;color:var(--green)}
.app-tags{font-size:.78rem;color:var(--muted)}
.apps-empty{text-align:center;color:var(--muted);padding:4rem;font-size:1rem;border:1px dashed var(--border);border-radius:18px;grid-column:1/-1}

/* BUTTONS */
.btn-primary{padding:.75rem 1.6rem;border-radius:12px;background:var(--grad);color:#fff;font-family:'Heebo',sans-serif;font-size:.98rem;font-weight:700;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,123,255,.35)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,212,255,.4)}

/* TOAST */
.toast{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%) translateY(30px);background:var(--bg2);border:1px solid var(--green);color:var(--green);padding:.65rem 1.4rem;border-radius:100px;font-size:.9rem;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red)}

footer{text-align:center;padding:3rem 2rem 2rem;border-top:1px solid var(--border);color:var(--muted);font-size:.9rem;position:relative;z-index:1}
footer a{color:var(--cyan);text-decoration:none}

/* REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .5s,transform .5s}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  .nav-links{display:none}.hamburger{display:flex}
  .nav-links.open{display:flex;flex-direction:column;position:fixed;top:64px;right:0;left:0;background:rgba(7,17,31,.97);backdrop-filter:blur(16px);padding:2rem;gap:1.5rem;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<nav>
  <a href="index.html" class="nav-logo">YTech</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">ראשי</a></li>
    <li><a href="index.html#pricing">מחירים</a></li>
    <li><a href="apps.html" class="active">אפליקציות</a></li>
    <li><a href="index.html#order">הזמנה</a></li>
    <li><a href="index.html#contact">צור קשר</a></li>
  </ul>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="page">
  <div class="page-header reveal">
    <div class="section-label">📦 פרויקטים</div>
    <h1 class="page-title">האפליקציות <span>שלי</span></h1>
    <p class="page-desc">אוסף האפליקציות והתוכנות שפיתחתי – לחץ להורדה.</p>
  </div>

  <div class="filter-bar reveal" id="filterBar">
    <button class="filter-btn active" data-cat="הכל">🔍 הכל</button>
  </div>

  <div class="apps-grid" id="appsGrid">
    <div class="apps-empty" id="appsEmpty">🚀 אין פרויקטים עדיין – הוסף מפאנל הניהול!</div>
  </div>
</div>

<footer>
  <p>© 2026 YTech. כל הזכויות שמורות.</p>
  <p style="margin-top:.4rem"><a href="index.html">← חזור לדף הראשי</a></p>
</footer>

<div class="toast" id="toast"></div>

<script>
/* ── CANVAS BG ── */
(function(){
  const C=document.getElementById('bgCanvas'),ctx=C.getContext('2d');
  let W,H,pts=[],mouse={x:-9999,y:-9999};
  const CONNECT_DIST=160,MOUSE_DIST=180,MOUSE_PULL=0.018,BASE_SPEED=0.4,DOT_COLOR='0,210,220',BG='#07111f';
  function resize(){
    W=C.width=innerWidth;H=C.height=innerHeight;pts=[];
    const n=Math.floor(W*H/9000);
    for(let i=0;i<n;i++){const x=Math.random()*W,y=Math.random()*H;pts.push({x,y,hx:x,hy:y,vx:(Math.random()-.5)*BASE_SPEED*2,vy:(Math.random()-.5)*BASE_SPEED*2,pulled:false,r:Math.random()*1.8+.8});}
  }
  resize();window.addEventListener('resize',resize);
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
  window.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999});
  function draw(){
    ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONNECT_DIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(${DOT_COLOR},${(1-d/CONNECT_DIST)*0.32})`;ctx.lineWidth=0.8;ctx.stroke();}
      }
      const mdx=pts[i].x-mouse.x,mdy=pts[i].y-mouse.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<MOUSE_DIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(mouse.x,mouse.y);ctx.strokeStyle=`rgba(${DOT_COLOR},${(1-md/MOUSE_DIST)*0.55})`;ctx.lineWidth=0.9;ctx.stroke();}
    }
    for(const p of pts){
      const mdx=mouse.x-p.x,mdy=mouse.y-p.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<MOUSE_DIST){p.vx+=mdx/md*MOUSE_PULL;p.vy+=mdy/md*MOUSE_PULL;p.pulled=true;}
      else if(p.pulled){const rx=p.hx-p.x,ry=p.hy-p.y,rd=Math.sqrt(rx*rx+ry*ry);if(rd>1){p.vx+=rx/rd*0.06;p.vy+=ry/rd*0.06;}else{p.pulled=false;}}
      else{const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(spd<BASE_SPEED*0.5){p.vx+=(Math.random()-.5)*0.05;p.vy+=(Math.random()-.5)*0.05;}p.hx=p.x;p.hy=p.y;}
      p.vx*=0.97;p.vy*=0.97;
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy),maxSpd=p.pulled?1.5:BASE_SPEED;
      if(spd>maxSpd){p.vx=p.vx/spd*maxSpd;p.vy=p.vy/spd*maxSpd;}
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0){p.x=0;p.vx*=-1;}if(p.x>W){p.x=W;p.vx*=-1;}
      if(p.y<0){p.y=0;p.vy*=-1;}if(p.y>H){p.y=H;p.vy*=-1;}
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3.5);
      g.addColorStop(0,`rgba(${DOT_COLOR},0.85)`);g.addColorStop(1,`rgba(${DOT_COLOR},0)`);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${DOT_COLOR},1)`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── NAV ── */
const hamburger=document.getElementById('hamburger'),navLinks=document.getElementById('navLinks');
hamburger.addEventListener('click',()=>navLinks.classList.toggle('open'));
navLinks.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>navLinks.classList.remove('open')));

/* ── REVEAL ── */
const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target)}})},{threshold:.1});
document.querySelectorAll('.reveal').forEach(r=>io.observe(r));

/* ── DATA ── */
function loadApps(){try{return JSON.parse(localStorage.getItem('mc_apps')||'[]')}catch{return[]}}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ── FILTER ── */
let activeCat='הכל';
function buildFilters(apps){
  const bar=document.getElementById('filterBar');
  const cats=[...new Set(apps.map(a=>a.cat))];
  bar.innerHTML='<button class="filter-btn active" data-cat="הכל" onclick="filterApps(\'הכל\',this)">🔍 הכל</button>';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='filter-btn';b.dataset.cat=c;
    b.textContent=c;
    b.onclick=function(){filterApps(c,this)};
    bar.appendChild(b);
  });
}
function filterApps(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

/* ── RENDER ── */
function renderGrid(){
  const apps=loadApps();
  const grid=document.getElementById('appsGrid');
  const empty=document.getElementById('appsEmpty');
  const filtered=activeCat==='הכל'?apps:apps.filter(a=>a.cat===activeCat);
  grid.querySelectorAll('.app-card').forEach(c=>c.remove());
  empty.style.display=filtered.length?'none':'block';
  filtered.forEach(a=>{
    const el=document.createElement(a.link?'a':'div');
    el.className='app-card';
    if(a.link){el.href=a.link;el.target='_blank';el.rel='noopener noreferrer'}
    el.innerHTML=`
      <div class="app-emoji">${a.emoji}</div>
      <div class="app-cat">${esc(a.cat)}</div>
      <div class="app-name">${esc(a.name)}</div>
      <div class="app-desc">${esc(a.desc)}</div>
      ${a.price?`<div class="app-price-tag">${esc(a.price)}</div>`:`<div class="app-free">✅ חינמי</div>`}
      ${a.tags?`<div class="app-tags">${esc(a.tags)}</div>`:''}
    `;
    grid.appendChild(el);
  });
}

/* INIT */
const apps=loadApps();
buildFilters(apps);
renderGrid();
</script>
</body>
</html>
