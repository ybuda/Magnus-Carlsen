<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתקין האפליקציות האוטומטי</title>
    <style>
        :root {
            --primary: #00d2d3;
            --dark: #222f3e;
            --light: #c8d6e5;
            --bg: #1e272e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary);
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--dark);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 20px;
        }

        button {
            background-color: var(--primary);
            border: none;
            padding: 10px 20px;
            color: var(--dark);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #48dbfb;
        }

        button:disabled {
            background-color: #576574;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-family: monospace;
            color: #fab1a0;
            min-height: 20px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .app-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .app-card:hover {
            border-color: var(--primary);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: var(--light);
            border-radius: 12px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--dark);
        }

        .app-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .app-status {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        
        .progress-bar {
            width: 100%;
            height: 5px;
            background: #444;
            margin-top: 10px;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.2s;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>חנות הארגון - התקנה אוטומטית</h1>
        
        <div class="controls">
            <button id="connectBtn">🔌 חבר מכשיר אנדרואיד</button>
            <button id="installAllBtn" disabled>⬇️ התקן את כל האפליקציות</button>
        </div>

        <div id="status" class="status-bar">ממתין לחיבור מכשיר...</div>

        <div class="app-grid" id="appGrid">
            <!-- האפליקציות יטענו כאן דרך JS -->
        </div>
    </div>

    <!-- שימוש ב-ES Modules כדי לייבא את ספריית ADB -->
    <script type="module">
        // ייבוא ספריות חיצוניות לטיפול ב-ADB דרך הדפדפן
        import { AdbDaemonWebUsbDeviceManager } from "https://esm.sh/@yume-chan/adb-daemon-webusb@0.0.21";
        import { Adb, AdbTransport } from "https://esm.sh/@yume-chan/adb@0.0.21";
        
        // --- הגדרות האפליקציות שלך ---
        // עליך לשים את קבצי ה-APK באותה תיקייה או לתת קישור מלא
        const apps = [
            { name: "אפליקציית עובדים", file: "employee_app.apk", icon: "👤" },
            { name: "מערכת ניהול", file: "management.apk", icon: "📊" },
            { name: "ווטסאפ ארגוני", file: "whatsapp_mod.apk", icon: "💬" },
            { name: "דפדפן מאובטח", file: "browser.apk", icon: "🌐" }
        ];

        // משתנים גלובליים
        let adbInstance = null;
        let device = null;
        const Manager = AdbDaemonWebUsbDeviceManager.INSTANCE;
        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const installAllBtn = document.getElementById('installAllBtn');
        const appGrid = document.getElementById('appGrid');

        // יצירת ה-UI
        function renderApps() {
            appGrid.innerHTML = '';
            apps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <div class="app-icon">${app.icon}</div>
                    <div class="app-name">${app.name}</div>
                    <div class="app-status" id="status-${index}">ממתין להתקנה</div>
                    <div class="progress-bar" id="progress-${index}">
                        <div class="progress-fill" id="fill-${index}"></div>
                    </div>
                `;
                appGrid.appendChild(card);
            });
        }

        // פונקציית התחברות
        async function connectDevice() {
            try {
                const deviceItem = await Manager.requestDevice();
                if (!deviceItem) return;

                const connection = await deviceItem.connect();
                
                // יצירת מופע ADB
                // הערה: שימוש בסיסי, במקרה אמיתי צריך לנהל אימות (Keys)
                // בספריה זו, אם אין מפתחות, הדפדפן יבקש אישור במכשיר
                adbInstance = await Adb.open(connection);
                
                statusEl.innerText = "✅ מכשיר מחובר בהצלחה! מוכן להתקנה.";
                statusEl.style.color = "#55efc4";
                connectBtn.disabled = true;
                connectBtn.innerText = "מחובר";
                installAllBtn.disabled = false;

            } catch (error) {
                console.error(error);
                statusEl.innerText = "❌ שגיאה בחיבור: " + error.message;
                alert("וודא ש'ניפוי באגים ב-USB' דלוק במכשיר ושאישרת את החיבור בחלון הקופץ בטלפון.");
            }
        }

        // לוגיקת ההתקנה (Push & Install)
        async function installAllApps() {
            installAllBtn.disabled = true;
            
            for (let i = 0; i < apps.length; i++) {
                const app = apps[i];
                const statusTxt = document.getElementById(`status-${i}`);
                const progressBar = document.getElementById(`progress-${i}`);
                const progressFill = document.getElementById(`fill-${i}`);

                statusTxt.innerText = "⏳ מוריד...";
                progressBar.style.display = "block";
                progressFill.style.width = "20%";

                try {
                    // 1. הורדת ה-APK מהשרת לדפדפן (כ-Blob)
                    const response = await fetch(app.file);
                    if (!response.ok) throw new Error("קובץ לא נמצא בשרת");
                    const blob = await response.blob();
                    
                    progressFill.style.width = "50%";
                    statusTxt.innerText = "📲 מעביר למכשיר...";

                    // 2. פתיחת Stream להעברת הקובץ (Sync Service)
                    const sync = await adbInstance.sync();
                    const tempPath = `/data/local/tmp/${app.file}`;
                    
                    // שימוש ב-ReadableStream להעברה
                    const fileStream = blob.stream();
                    // הערה: בספריית WebADB הפקודה היא write
                    await sync.write({
                        filename: tempPath,
                        file: fileStream,
                        mode: 0o644,
                        mtime: Date.now() / 1000
                    });
                    
                    sync.dispose();

                    progressFill.style.width = "80%";
                    statusTxt.innerText = "⚙️ מתקין...";

                    // 3. הרצת פקודת ההתקנה (PM Install)
                    // יצירת תהליך Shell
                    const process = await adbInstance.subprocess.spawn(`pm install -r ${tempPath}`);
                    
                    // המתנה לסיום התהליך
                    await process.exit;

                    // ניקוי הקובץ הזמני
                    await adbInstance.subprocess.spawn(`rm ${tempPath}`);

                    progressFill.style.width = "100%";
                    statusTxt.innerText = "✅ הותקן בהצלחה!";
                    statusTxt.style.color = "#55efc4";

                } catch (err) {
                    console.error(err);
                    statusTxt.innerText = "❌ נכשל: " + err.message;
                    statusTxt.style.color = "#ff7675";
                    progressFill.style.background = "red";
                }
            }
            
            installAllBtn.disabled = false;
            statusEl.innerText = "תהליך ההתקנה הסתיים.";
        }

        // האזנה לאירועים
        connectBtn.addEventListener('click', connectDevice);
        installAllBtn.addEventListener('click', installAllApps);

        // אתחול ראשוני
        renderApps();
        
        // בדיקה אם הדפדפן תומך
        if (!navigator.usb) {
            statusEl.innerText = "⚠️ הדפדפן שלך לא תומך ב-WebUSB. אנא השתמש ב-Chrome או Edge.";
            connectBtn.disabled = true;
        }
    </script>
</body>
</html>
